<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>CMCP Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bl:#003DA6;--bm:#0052CC;--ye:#FFD100;--gr:#00A651;--wh:#fff;--lg:#EEF2FA;--dk:#0A1A3A;--mg:#6B7A99;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito Sans',sans-serif;background:#F4F7FF;color:var(--dk);padding:20px;min-height:100vh;}
.wrap{max-width:1200px;margin:0 auto;}
.head{background:var(--bl);color:var(--wh);padding:20px 24px;border-radius:14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.head h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;}
.head h1 span{color:var(--ye);}
.head .refresh{background:var(--ye);color:var(--bl);border:none;border-radius:8px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;font-size:.85rem;}
.login{max-width:380px;margin:80px auto;background:var(--wh);padding:32px;border-radius:16px;box-shadow:0 8px 24px rgba(0,61,166,.1);text-align:center;}
.login h2{font-family:'Nunito',sans-serif;font-weight:900;margin-bottom:6px;color:var(--bl);}
.login p{color:var(--mg);font-size:.85rem;margin-bottom:18px;}
.login input{width:100%;padding:12px 14px;border:2px solid #D0DCEF;border-radius:10px;font-size:.95rem;font-family:'Nunito Sans',sans-serif;margin-bottom:12px;}
.login input:focus{outline:none;border-color:var(--bl);}
.login button{width:100%;background:var(--bl);color:var(--wh);border:none;border-radius:10px;padding:12px;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;font-size:.95rem;}
.err{color:#B00;font-size:.8rem;margin-top:6px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat{background:var(--wh);border-radius:14px;padding:18px;box-shadow:0 4px 12px rgba(0,61,166,.05);}
.stat-lbl{font-family:'Nunito',sans-serif;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--mg);margin-bottom:4px;}
.stat-val{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.8rem;color:var(--bl);}
.stat-sub{font-size:.75rem;color:var(--mg);margin-top:2px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.card{background:var(--wh);border-radius:14px;padding:20px;box-shadow:0 4px 12px rgba(0,61,166,.05);}
.card h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;color:var(--dk);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card h3 .bdg{background:var(--ye);color:var(--bl);font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:900;}
.list{list-style:none;}
.list li{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--lg);}
.list li:last-child{border-bottom:none;}
.list .lbl{flex:1;font-size:.88rem;color:var(--dk);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px;}
.list .cnt{background:var(--lg);color:var(--bl);font-family:'Nunito',sans-serif;font-weight:900;font-size:.82rem;padding:4px 10px;border-radius:8px;min-width:40px;text-align:center;}
.opp .cnt{background:var(--gr);color:var(--wh);}
.chart-wrap{background:var(--wh);border-radius:14px;padding:20px;box-shadow:0 4px 12px rgba(0,61,166,.05);margin-bottom:20px;}
.chart-wrap h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;margin-bottom:14px;}
.bars{display:flex;align-items:flex-end;gap:4px;height:160px;overflow-x:auto;padding-bottom:6px;}
.bar-col{display:flex;flex-direction:column;align-items:center;min-width:36px;}
.bar{width:28px;background:linear-gradient(to top,var(--bl),var(--bm));border-radius:4px 4px 0 0;min-height:3px;position:relative;}
.bar-lbl{font-size:.65rem;color:var(--mg);margin-top:4px;text-align:center;}
.bar-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:.65rem;font-weight:800;color:var(--bl);white-space:nowrap;}
.loading{text-align:center;padding:60px 20px;color:var(--mg);}
.spn{display:inline-block;width:32px;height:32px;border:3px solid var(--lg);border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.back{display:inline-block;margin-top:10px;color:var(--bl);text-decoration:none;font-size:.85rem;font-weight:700;}
.empty{text-align:center;padding:40px 20px;color:var(--mg);font-size:.9rem;}
@media(max-width:800px){.stats{grid-template-columns:repeat(2,1fr);}.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="loginView" class="login">
  <h2>🔐 Admin Dashboard</h2>
  <p>CompareMyCarParts — Stats & Insights</p>
  <input type="password" id="pwInput" placeholder="Enter password" autofocus/>
  <button onclick="login()">Sign In</button>
  <div class="err" id="loginErr"></div>
  <a href="/" class="back">← Back to site</a>
</div>

<div id="dashView" class="wrap" style="display:none;">
  <div class="head">
    <h1>Compare<span>MyCarParts</span> — Admin</h1>
    <button class="refresh" onclick="load()">🔄 Refresh</button>
  </div>

  <div id="content">
    <div class="loading"><div class="spn"></div><br>Loading analytics...</div>
  </div>
</div>

<script>
var WORKER_URL = "https://cmcp-ebay.idris-b19.workers.dev";
var adminPw = "";

function login() {
  var pw = document.getElementById('pwInput').value;
  if (!pw) return;
  adminPw = pw;
  testLogin();
}

async function testLogin() {
  try {
    var resp = await fetch(WORKER_URL + '/admin?pw=' + encodeURIComponent(adminPw));
    if (resp.status === 401) {
      document.getElementById('loginErr').textContent = 'Wrong password';
      return;
    }
    // Save for session
    sessionStorage.setItem('cmcp_pw', adminPw);
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
    load();
  } catch(e) {
    document.getElementById('loginErr').textContent = 'Error: ' + e.message;
  }
}

async function load() {
  var content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spn"></div><br>Loading...</div>';

  try {
    var resp = await fetch(WORKER_URL + '/admin?pw=' + encodeURIComponent(adminPw));
    var data = await resp.json();

    if (data.error) {
      content.innerHTML = '<div class="empty">⚠️ ' + data.error + '<br><br>Make sure the Cloudflare KV namespace is set up and bound to the Worker as CMCP_ANALYTICS.</div>';
      return;
    }

    render(data);
  } catch(e) {
    content.innerHTML = '<div class="empty">Error loading: ' + e.message + '</div>';
  }
}

function render(data) {
  var totalSearches = 0, totalClicks = 0, daysActive = 0;
  var dailyBars = [];

  if (data.dailyTotals) {
    var dates = Object.keys(data.dailyTotals).sort();
    dates.forEach(function(d) {
      var day = data.dailyTotals[d];
      totalSearches += day.searches || 0;
      totalClicks += day.clicks || 0;
      if ((day.searches || 0) > 0) daysActive++;
      dailyBars.push({ date: d, searches: day.searches || 0, clicks: day.clicks || 0 });
    });
  }

  var clickRate = totalSearches > 0 ? Math.round((totalClicks / totalSearches) * 100) : 0;

  var html = '';

  // Stats row
  html += '<div class="stats">';
  html += '<div class="stat"><div class="stat-lbl">Total Searches</div><div class="stat-val">' + totalSearches.toLocaleString() + '</div><div class="stat-sub">All time</div></div>';
  html += '<div class="stat"><div class="stat-lbl">Total Clicks</div><div class="stat-val">' + totalClicks.toLocaleString() + '</div><div class="stat-sub">Affiliate click-throughs</div></div>';
  html += '<div class="stat"><div class="stat-lbl">Click-Through Rate</div><div class="stat-val">' + clickRate + '%</div><div class="stat-sub">Clicks ÷ Searches</div></div>';
  html += '<div class="stat"><div class="stat-lbl">Active Days</div><div class="stat-val">' + daysActive + '</div><div class="stat-sub">Days with traffic</div></div>';
  html += '</div>';

  // Daily chart
  if (dailyBars.length > 0) {
    var maxVal = Math.max.apply(null, dailyBars.map(function(d) { return d.searches; }));
    html += '<div class="chart-wrap"><h3>📈 Daily Search Volume</h3><div class="bars">';
    dailyBars.forEach(function(d) {
      var h = maxVal > 0 ? (d.searches / maxVal) * 140 : 0;
      var shortDate = d.date.split('-').slice(1).join('/');
      html += '<div class="bar-col"><div class="bar" style="height:' + h + 'px"><div class="bar-val">' + d.searches + '</div></div><div class="bar-lbl">' + shortDate + '</div></div>';
    });
    html += '</div></div>';
  }

  // Two-column grid
  html += '<div class="grid">';

  // Top Searches
  html += '<div class="card"><h3>🔍 Top Searched Parts <span class="bdg">What people want</span></h3>';
  if (data.topSearches && data.topSearches.length > 0) {
    html += '<ul class="list">';
    data.topSearches.slice(0, 15).forEach(function(item) {
      html += '<li><span class="lbl">' + item.label + '</span><span class="cnt">' + item.count + '</span></li>';
    });
    html += '</ul>';
  } else {
    html += '<div class="empty">No searches yet</div>';
  }
  html += '</div>';

  // Top Clicks = Opportunity
  html += '<div class="card opp"><h3>💰 Top Conversions <span class="bdg">Stock these!</span></h3>';
  if (data.topClicks && data.topClicks.length > 0) {
    html += '<ul class="list">';
    data.topClicks.slice(0, 15).forEach(function(item) {
      html += '<li><span class="lbl">' + item.label + '</span><span class="cnt">' + item.count + '</span></li>';
    });
    html += '</ul>';
  } else {
    html += '<div class="empty">No clicks tracked yet</div>';
  }
  html += '</div>';

  html += '</div>';

  // Export button
  html += '<div style="text-align:center;margin-top:20px;"><button onclick="exportCSV()" style="background:var(--gr);color:white;border:none;padding:10px 20px;border-radius:10px;font-family:Nunito,sans-serif;font-weight:800;cursor:pointer;">📥 Export to CSV</button></div>';

  html += '<p style="text-align:center;margin-top:20px;color:var(--mg);font-size:.75rem;">Last updated: ' + new Date(data.generatedAt).toLocaleString('en-GB') + '</p>';

  document.getElementById('content').innerHTML = html;
  window._analyticsData = data;
}

function exportCSV() {
  var data = window._analyticsData;
  if (!data) return;
  var rows = [['Type', 'Vehicle | Part | Supplier', 'Count']];
  data.topSearches.forEach(function(s) { rows.push(['Search', s.label, s.count]); });
  data.topClicks.forEach(function(s) { rows.push(['Click', s.label, s.count]); });
  var csv = rows.map(function(r) { return r.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(','); }).join('\n');
  var blob = new Blob([csv], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'cmcp-analytics-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

// Auto-login if password saved this session
window.addEventListener('load', function() {
  var saved = sessionStorage.getItem('cmcp_pw');
  if (saved) {
    adminPw = saved;
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
    load();
  }
});

// Enter key to login
document.getElementById('pwInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
</script>

</body>
</html>
