

<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompareMyCarParts.com | UK Car Parts Price Comparison</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bl: #003DA6; --dk: #002574; --ye: #FFD100; --gr: #2ecc71; --wh: #ffffff; }
        
        body { 
            font-family: 'Nunito', sans-serif; margin: 0; 
            background-color: var(--bl); color: var(--wh); 
            min-height: 100vh; overflow-x: hidden;
        }

        /* Nav & Logos */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--wh); text-decoration: none; }
        .logo span { color: var(--ye); }

        .brand-strip { background: var(--wh); padding: 12px 0; overflow: hidden; display: flex; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .brand-scroll { display: flex; gap: 50px; animation: scroll 30s linear infinite; white-space: nowrap; }
        .brand-scroll span { color: #333; font-weight: 900; font-size: 0.9rem; opacity: 0.7; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Hero */
        .hero { text-align: center; padding: 30px 20px 10px; }
        .hero h1 { font-size: clamp(2rem, 6vw, 3rem); font-weight: 900; margin: 0; }
        .hero h1 span { color: var(--ye); }

        /* Search Card */
        .search-card { 
            background: var(--wh); border-radius: 25px; padding: 30px; 
            max-width: 550px; margin: 20px auto; color: #333; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); 
        }

        /* Plate Styling */
        .plate-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .plate-box { 
            background: var(--ye); border: 3px solid #1a1a1a; border-radius: 12px; 
            display: flex; flex: 2; height: 60px; overflow: hidden; 
        }
        .gb { background: #003DA6; color: white; width: 40px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; flex-direction: column; }
        .plate-in { background: transparent; border: none; text-align: center; font-size: 2rem; font-weight: 900; width: 100%; outline: none; text-transform: uppercase; font-family: inherit; }
        
        .find-btn { flex: 1; background: #3b5998; color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .find-btn:hover { background: var(--dk); }

        /* Part Section (Hidden until Reg found) */
        #part-section { display: none; border-top: 2px dashed #eee; margin-top: 20px; padding-top: 20px; animation: fadeIn 0.5s; }
        .part-input { width: 100%; padding: 18px; border: 2px solid var(--bl); border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; }
        .compare-btn { width: 100%; background: var(--ye); color: #1a1a1a; border: none; padding: 20px; border-radius: 12px; font-weight: 900; font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 0 #d4ae00; }

        /* Table Styling */
        #results-screen { display: none; max-width: 900px; margin: 0 auto; padding: 20px; animation: fadeIn 0.5s; }
        .results-table { width: 100%; background: white; border-radius: 20px; border-collapse: collapse; color: #333; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .results-table th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .results-table td { padding: 20px 15px; border-top: 1px solid #eee; font-weight: 700; }
        .price { color: var(--bl); font-size: 1.3rem; font-weight: 900; }
        .buy-btn { background: var(--gr); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        #loader { display: none; text-align: center; padding-top: 15vh; }
        .spinner { width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.2); border-top-color: var(--ye); border-radius: 50%; animation: spin 1s infinite linear; margin: 0 auto 20px; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav><a href="#" class="logo">Compare <span>MyCarParts.com</span></a></nav>

<div class="brand-strip">
    <div class="brand-scroll">
        <span>EURO CAR PARTS</span> <span>GSF CAR PARTS</span> <span>AMAZON MOTORS</span> <span>EBAY MOTORS</span> <span>AUTODOC</span> <span>CARPARTS4LESS</span> <span>EURO CAR PARTS</span> <span>GSF CAR PARTS</span>
    </div>
</div>

<div id="search-screen">
    <div class="hero"><h1>Compare<span>MyCarParts.com</span></h1></div>
    <div class="search-card">
        <div id="reg-section">
            <div style="text-align:center; font-weight:800; margin-bottom:10px; font-size:0.8rem;">STEP 1: IDENTIFY VEHICLE</div>
            <div class="plate-row">
                <div class="plate-box">
                    <div class="gb">🇬🇧<br>GB</div>
                    <input type="text" id="regIn" class="plate-in" placeholder="REG">
                </div>
                <button class="find-btn" id="findBtn" onclick="findCar()">Find Car</button>
            </div>
        </div>

        <div id="part-section">
            <div id="car-confirm" style="text-align:center; font-weight:800; color:var(--gr); margin-bottom:15px;">✓ VEHICLE IDENTIFIED</div>
            <input list="parts-data" id="partIn" class="part-input" placeholder="Search part (e.g. Brake Pads)">
            <datalist id="parts-data">
                <option value="Brake Pads"><option value="Brake Discs"><option value="Car Battery"><option value="Oil Filter"><option value="Wiper Blades">
            </datalist>
            <button class="compare-btn" onclick="showResults()">Compare Live Prices</button>
        </div>
    </div>
</div>

<div id="loader"><div class="spinner"></div><h2 style="font-weight:900;">Comparing All UK Suppliers...</h2></div>

<div id="results-screen">
    <h2 style="text-align:center; margin-bottom:20px;">Live Prices for <span id="display-part" style="color:var(--ye)"></span></h2>
    <div id="table-container"></div>
    <button onclick="location.reload()" style="background:none; border:none; color:white; width:100%; margin-top:30px; cursor:pointer; text-decoration:underline; font-weight:700;">New Search</button>
</div>

<script>
    // ENTER YOUR CLOUDFLARE WORKER LINK HERE
    const WORKER_URL = 'https://YOUR_WORKER_URL.workers.dev'; 

    async function findCar() {
        const reg = document.getElementById('regIn').value;
        if(!reg) return alert("Please enter a registration.");
        
        document.getElementById('findBtn').innerText = "...";
        
        try {
            const res = await fetch(`${WORKER_URL}/dvla?reg=${reg}`);
            const data = await res.json();
            document.getElementById('car-confirm').innerText = `✓ ${data.make} ${data.model} (${data.year})`;
            document.getElementById('reg-section').style.opacity = '0.5';
            document.getElementById('part-section').style.display = 'block';
        } catch (e) {
            // Fallback if worker isn't responding yet
            document.getElementById('part-section').style.display = 'block';
        }
    }

    async function showResults() {
        const part = document.getElementById('partIn').value;
        const reg = document.getElementById('regIn').value;
        if(!part) return alert("Please select or type a part name.");

        document.getElementById('search-screen').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('display-part').innerText = part;

        try {
            const res = await fetch(`${WORKER_URL}/search?part=${part}&reg=${reg}`);
            const results = await res.json();
            
            let tableHtml = `<table class="results-table"><thead><tr><th>Supplier</th><th>Price</th><th>Action</th></tr></thead><tbody>`;
            results.forEach(item => {
                tableHtml += `<tr><td>${item.supplier}</td><td class="price">£${item.price}</td><td><button class="buy-btn" onclick="window.open('${item.url}')">VIEW</button></td></tr>`;
            });
            tableHtml += `</tbody></table>`;
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('table-container').innerHTML = tableHtml;
            document.getElementById('results-screen').style.display = 'block';
        } catch (e) {
            // Mock data for testing if Worker URL is not yet connected
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('table-container').innerHTML = `<table class="results-table"><tr><td>eBay Motors</td><td class="price">£18.50</td><td><button class="buy-btn" onclick="window.open('https://ebay.co.uk')">VIEW</button></td></tr></table>`;
                document.getElementById('results-screen').style.display = 'block';
            }, 2000);
        }
    }
</script>
</body>
</html>
