

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare My Car Parts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .verified-badge { background-color: #059669; color: white; padding: 4px 12px; border-radius: 9999px; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-900">CompareMyCarParts</h1>
            <p class="text-gray-600">The UK's #1 Part Price Comparison</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-md mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Enter Vehicle Registration</label>
            <div class="flex gap-2">
                <input type="text" id="regInput" placeholder="e.g. LM72 JNX" class="flex-1 p-3 border rounded-lg uppercase font-bold text-xl text-center">
                <button onclick="identifyVehicle()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700">Identify</button>
            </div>
            <div id="statusMessage" class="mt-4 text-center hidden"></div>
        </div>

        <div id="vehicleCard" class="bg-white p-6 rounded-xl shadow-md mb-6 hidden">
            <div class="flex justify-center mb-4">
                <span class="verified-badge">VEHICLE VERIFIED - FITMENT GUARANTEED</span>
            </div>
            <h2 id="vehicleName" class="text-xl font-bold text-center text-gray-800"></h2>
            <p id="vehicleYear" class="text-center text-gray-500"></p>
            
            <hr class="my-4">
            
            <label class="block text-sm font-medium text-gray-700 mb-2">Select Part Category</label>
            <select id="partSelect" class="w-full p-3 border rounded-lg mb-4">
                <option value="Brake Pads">Brake Pads</option>
                <option value="Oil Filter">Oil Filter</option>
                <option value="Spark Plugs">Spark Plugs</option>
                <option value="Wiper Blades">Wiper Blades</option>
            </select>
            <button onclick="comparePrices()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">Compare eBay Prices</button>
        </div>

        <div id="resultsArea"></div>
    </div>

    <script>
        // THIS IS THE BRIDGE WE FIXED
        const WORKER_URL = 'https://cmcp-ebay.idris-b19.workers.dev';

        async function identifyVehicle() {
            const reg = document.getElementById('regInput').value.trim();
            const status = document.getElementById('statusMessage');
            const card = document.getElementById('vehicleCard');
            
            if (!reg) return;

            status.innerHTML = "🔍 Fetching DVLA Data...";
            status.classList.remove('hidden');
            card.classList.add('hidden');

            try {
                const response = await fetch(`${WORKER_URL}/dvla?reg=${reg}`);
                const data = await response.json();

                if (data.make) {
                    document.getElementById('vehicleName').innerText = `${data.make} ${data.model || ''}`;
                    document.getElementById('vehicleYear').innerText = `Year: ${data.yearOfManufacture || 'N/A'} | Fuel: ${data.fuelType || 'N/A'}`;
                    status.classList.add('hidden');
                    card.classList.remove('hidden');
                } else {
                    status.innerHTML = "❌ Vehicle not found. Check reg.";
                }
            } catch (err) {
                status.innerHTML = "⚠️ Error connecting to server.";
            }
        }

        async function comparePrices() {
            const vehicle = document.getElementById('vehicleName').innerText;
            const part = document.getElementById('partSelect').value;
            const results = document.getElementById('resultsArea');
            
            results.innerHTML = "<p class='text-center'>Searching eBay for best prices...</p>";

            try {
                const query = `${vehicle} ${part}`;
                const response = await fetch(`${WORKER_URL}/ebay?q=${encodeURIComponent(query)}`);
                const items = await response.json();

                if (items && items.length > 0) {
                    results.innerHTML = items.map(item => `
                        <div class="bg-white p-4 rounded-xl shadow-sm mb-3 border-l-4 border-blue-500">
                            <h3 class="font-bold text-sm text-gray-800">${item.title}</h3>
                            <p class="text-blue-600 font-bold">£${item.price}</p>
                            <a href="${item.url}" target="_blank" class="text-xs text-gray-400 underline">View on eBay</a>
                        </div>
                    `).join('');
                } else {
                    results.innerHTML = "<p class='text-center'>No parts found on eBay.</p>";
                }
            } catch (err) {
                results.innerHTML = "<p class='text-center text-red-500'>eBay connection failed.</p>";
            }
        }
    </script>
</body>
</html>
