
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompareMyCarParts.com | Compare UK Car Parts Prices</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bl:#003DA6;--bm:#0052CC;--b2:#1A6FD4;--ye:#FFD100;--yd:#E6BC00;--wh:#fff;--ow:#F4F7FF;--lg:#EEF2FA;--mg:#6B7A99;--dk:#0A1A3A;--gr:#00A651;--gn:#E6F7EE;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Nunito Sans',sans-serif;background:var(--wh);color:var(--dk);overflow-x:hidden;}
        
        /* Navigation */
        nav{background:var(--bl);position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(0,0,0,.2);}
        .ni{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:64px;gap:16px;}
        .logo{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.3rem;color:var(--wh);text-decoration:none;}
        .logo span{color:var(--ye);}

        /* Hero & Search */
        .hero{background:linear-gradient(140deg,#001a5e 0%,var(--bl) 50%,var(--bm) 100%);padding:40px 20px;text-align:center;}
        .hero h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:clamp(1.8rem,6vw,3.5rem);color:var(--wh);margin-bottom:10px;}
        .sc{background:var(--wh);border-radius:20px;padding:22px;max-width:900px;margin:0 auto;box-shadow:0 20px 60px rgba(0,30,100,.2);}
        
        /* Plate Input */
        .pr{display:flex;gap:8px;margin-bottom:12px;}
        .pw{flex:1;display:flex;border-radius:12px;overflow:hidden;border:3px solid #1a1a1a;background:#F5D000;}
        .pg{background:var(--bl);color:var(--wh);padding:10px;font-size:0.8rem;display:flex;flex-direction:column;justify-content:center;}
        .pi{flex:1;background:transparent;border:none;outline:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:2rem;text-align:center;text-transform:uppercase;width:100%;}
        .pfb, .qb{background:var(--bl);color:var(--wh);border:none;border-radius:12px;padding:0 20px;font-weight:800;cursor:pointer;}
        .qb{background:var(--ye);color:var(--bl);padding:12px 24px;}

        /* Results Table */
        .tscr{overflow-x:auto;margin-top:20px;border-radius:12px;}
        table{width:100%;border-collapse:collapse;background:var(--wh);}
        th{background:var(--bl);color:var(--wh);padding:12px;font-size:0.7rem;text-transform:uppercase;text-align:left;}
        td{padding:12px;border-bottom:1px solid var(--lg);font-size:0.85rem;}
        .best{background:#f0fff7;}
        .stag{background:var(--lg);padding:4px 8px;border-radius:6px;font-weight:800;font-size:0.75rem;}
        .pc{font-weight:900;font-size:1.1rem;}
        .pcb{color:var(--gr);}
        
        /* Helper Classes */
        .vb{display:none;background:var(--gn);border:2px solid var(--gr);border-radius:10px;padding:10px;margin-bottom:10px;align-items:center;justify-content:space-between;}
        .vb.show{display:flex;}
        .spn{display:inline-block;width:30px;height:30px;border:3px solid var(--lg);border-top-color:var(--bl);border-radius:50%;animation:spin 1s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .dvla-err{background:#fff0f0;color:#b00;padding:10px;border-radius:8px;margin-bottom:10px;font-weight:700;}
        .sup-pills{display:flex;justify-content:center;gap:10px;padding:20px;flex-wrap:wrap;}
        .spill{background:var(--lg);padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:700;}
    </style>
</head>
<body>

<nav>
    <div class="ni">
        <a class="logo" href="#">Compare<span>MyCarParts</span>.com</a>
    </div>
</nav>

<main>
    <section class="hero">
        <h1>Find Cheap Car Parts</h1>
        <p style="color:white; margin-bottom:20px;">Compare 12+ UK suppliers instantly. Fitment guaranteed.</p>
        
        <div class="sc">
            <div id="dvlaMsg"></div>
            
            <div class="vb" id="vcBox">
                <div style="text-align:left;">
                    <div style="color:var(--gr);font-size:0.7rem;font-weight:800;text-transform:uppercase;">Vehicle Found</div>
                    <div id="vcName" style="font-weight:900;font-size:1.1rem;"></div>
                    <div id="vcMeta" style="color:var(--mg);font-size:0.8rem;"></div>
                </div>
                <button onclick="resetV()" style="background:none;border:none;color:var(--bl);text-decoration:underline;cursor:pointer;font-weight:700;">Change</button>
            </div>

            <div class="pr" id="plateRow">
                <div class="pw">
                    <div class="pg">🇬🇧<span>GB</span></div>
                    <input class="pi" id="regIn" type="text" placeholder="AB12 CDE" maxlength="8">
                </div>
                <button class="pfb" id="findBtn" onclick="lookupReg()">🔍 Find Car</button>
            </div>

            <div id="partRow" style="display:flex; gap:10px; margin-top:10px;">
                <input id="partIn" type="text" placeholder="Enter part name (e.g. Brake Pads)" style="flex:1; padding:12px; border-radius:12px; border:2px solid #ddd; outline:none;">
                <button class="qb" onclick="doSearch()">Compare Prices</button>
            </div>

            <div id="resultsZone" style="display:none;">
                <div id="aiSec">
                    <div id="aiVehHead" style="margin-top:20px; font-weight:800; text-align:left; color:var(--bl);">
                        <span id="aiVeh"></span> <span id="aiPart" style="color:var(--dk);"></span>
                    </div>
                    <div class="tscr">
                        <table>
                            <thead>
                                <tr>
                                    <th>Supplier</th>
                                    <th>Part Description</th>
                                    <th>Price</th>
                                    <th>Delivery</th>
                                    <th>Stock</th>
                                    <th>Fit</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="aiBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="sup-pills"></div>
</main>

<script>
    // ===== CONFIGURATION =====
    const DVLA_KEY = 'OL8ThSDEih1E8cEDbASQLaW308RJjOR02MWb2PDO';
    const EBAY_WORKER_URL = 'https://cmcp-ebay.idris-b19.workers.dev';
    const AFF = { amazon: 'comparemycarp-21', ebay: '5339148906', awin: '2851027' };
    const AWIN_IDS = { 'Euro Car Parts': '197685', 'GSF Car Parts': '13655', 'Halfords': '197' };

    let vehicle = null;
    let rows = [];

    // --- DVLA Lookup ---
    async function lookupReg() {
        const regInput = document.getElementById('regIn');
        const reg = regInput.value.replace(/\s/g, '').toUpperCase();
        if (reg.length < 2) { showDvlaErr('Enter a valid reg.'); return; }

        const btn = document.getElementById('findBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spn" style="width:14px;height:14px;border-width:2px;"></span>';

        try {
            const resp = await fetch('https://driver-vehicle-licensing.api.gov.uk/vehicle-enquiry/v1/vehicles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-api-key': DVLA_KEY },
                body: JSON.stringify({ registrationNumber: reg })
            });

            if (!resp.ok) throw new Error('Not found');
            const data = await resp.json();

            applyVehicle({
                name: `${data.yearOfManufacture || ''} ${data.make} ${data.engineCapacity ? (data.engineCapacity/1000).toFixed(1) + 'L' : ''}`,
                meta: `${data.colour} · ${data.fuelType} · MOT: ${data.motStatus}`
            });
        } catch (e) {
            showDvlaErr('Reg not found. Using Demo Mode.');
            setTimeout(() => applyVehicle({ name: '2021 Ford Puma 1.0 EcoBoost', meta: 'Grey · Petrol · Demo Mode' }), 1200);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '🔍 Find Car';
        }
    }

    function applyVehicle(v) {
        vehicle = v;
        document.getElementById('vcName').textContent = v.name;
        document.getElementById('vcMeta').textContent = v.meta;
        document.getElementById('vcBox').classList.add('show');
        document.getElementById('plateRow').style.display = 'none';
        document.getElementById('dvlaMsg').innerHTML = '';
        document.getElementById('partIn').focus();
    }

    function resetV() {
        vehicle = null;
        document.getElementById('vcBox').classList.remove('show');
        document.getElementById('plateRow').style.display = 'flex';
        document.getElementById('regIn').value = '';
    }

    function showDvlaErr(msg) {
        document.getElementById('dvlaMsg').innerHTML = `<div class="dvla-err">⚠️ ${msg}</div>`;
    }

    // --- Search & Results ---
    async function doSearch() {
        const part = document.getElementById('partIn').value.trim();
        if (!part || !vehicle) return;

        document.getElementById('resultsZone').style.display = 'block';
        document.getElementById('aiVeh').textContent = vehicle.name;
        document.getElementById('aiPart').textContent = '— ' + part;
        
        const tbody = document.getElementById('aiBody');
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;"><div class="spn"></div><br>Comparing live prices...</td></tr>';

        try {
            const query = encodeURIComponent(part + ' ' + vehicle.name);
            const resp = await fetch(`${EBAY_WORKER_URL}?q=${query}`);
            const data = await resp.json();

            if (data.items && data.items.length > 0) {
                renderResults(part, data.items);
            } else {
                renderDemoResults(part);
            }
        } catch (e) {
            renderDemoResults(part);
        }
    }

    function renderResults(part, ebayItems) {
        rows = ebayItems.map(item => ({
            sup: 'eBay',
            ico: '🛒',
            price: parseFloat(item.price),
            desc: item.title.substring(0, 50) + '...',
            del: 'Standard',
            stock: 'In Stock',
            url: item.url
        }));

        // Add simulated "Big Name" rows
        const base = rows[0].price;
        rows.push({ sup: 'Euro Car Parts', ico: '🔵', price: base * 1.1, desc: part + ' (Premium)', del: 'Next Day', stock: 'In Stock', url: '#' });
        rows.push({ sup: 'GSF Car Parts', ico: '🟠', price: base * 0.95, desc: part + ' (OEM Spec)', del: 'Next Day', stock: 'Limited', url: '#' });

        rows.sort((a, b) => a.price - b.price);
        displayTable();
    }

    function renderDemoResults(part) {
        const base = 45.00;
        rows = [
            { sup: 'eBay', ico: '🛒', price: base, desc: part + ' - New', del: '2-3 Days', stock: 'In Stock', url: '#' },
            { sup: 'Euro Car Parts', ico: '🔵', price: base * 1.2, desc: part + ' - Bosch', del: 'Next Day', stock: 'In Stock', url: '#' },
            { sup: 'Amazon', ico: '📦', price: base * 0.9, desc: part + ' - Certified', del: 'Prime', stock: 'In Stock', url: '#' }
        ].sort((a, b) => a.price - b.price);
        displayTable();
    }

    function displayTable() {
        let html = '';
        rows.forEach((r, i) => {
            html += `<tr class="${i === 0 ? 'best' : ''}">
                <td><span class="stag">${r.ico} ${r.sup}</span></td>
                <td><div style="font-weight:700;">${r.desc}</div></td>
                <td><span class="pc ${i === 0 ? 'pcb' : ''}">£${r.price.toFixed(2)}</span></td>
                <td>${r.del}</td>
                <td><span style="color:green">●</span> ${r.stock}</td>
                <td><span style="background:var(--gn); color:var(--gr); padding:2px 6px; border-radius:4px; font-size:0.7rem;">Verified ✅</span></td>
                <td><button class="qb" style="padding:6px 12px; font-size:0.8rem;" onclick="window.open('${r.url}','_blank')">Buy →</button></td>
            </tr>`;
        });
        document.getElementById('aiBody').innerHTML = html;
    }

    // Initialize UI
    window.onload = () => {
        const pills = ['eBay', 'Amazon', 'Euro Car Parts', 'GSF', 'Halfords', 'Autodoc', 'Car Parts for Less'];
        document.querySelector('.sup-pills').innerHTML = pills.map(p => `<span class="spill">${p}</span>`).join('');
        document.getElementById('regIn').addEventListener('keypress', e => { if(e.key === 'Enter') lookupReg(); });
    };
</script>

</body>
</html>
